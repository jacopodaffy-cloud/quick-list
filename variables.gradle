ext {
    minSdkVersion = 22
    // Android 16. Play requires a target no more than one year behind the
    // latest release: from 31 Aug 2026 an app still on API 35 can no longer be
    // updated. Compiling against 36 needs AGP >= 8.6, which Capacitor 6 does
    // not scaffold — android.yml bumps AGP and the Gradle wrapper to match.
    compileSdkVersion = 36
    targetSdkVersion = 36
    androidxActivityVersion = '1.9.0'
    androidxAppCompatVersion = '1.7.0'
    androidxCoordinatorLayoutVersion = '1.2.0'
    androidxCoreVersion = '1.13.1'
    androidxFragmentVersion = '1.8.1'
    coreSplashScreenVersion = '1.0.1'
    androidxWebkitVersion = '1.11.0'
    junitVersion = '4.13.2'
    androidxJunitVersion = '1.2.1'
    androidxEspressoCoreVersion = '3.6.1'
    cordovaAndroidVersion = '10.0.0'
}
