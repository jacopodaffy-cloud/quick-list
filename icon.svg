<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="QuickList">
  <defs>
    <!-- A conic sweep is not available in SVG, so the Q is two arc segments that
         overlap by ~5°: red→orange over the top and right, then orange→blue down
         to the tail. The join lands on orange in both, so it is invisible. -->
    <linearGradient id="qA" gradientUnits="userSpaceOnUse" x1="226.4" y1="300.4" x2="693.1" y2="771.9">
      <stop offset="0" stop-color="#F4515E"/>
      <stop offset=".75" stop-color="#FBA01C"/>
      <stop offset="1" stop-color="#FBA01C"/>
    </linearGradient>
    <linearGradient id="qB" gradientUnits="userSpaceOnUse" x1="713.6" y1="751.6" x2="430" y2="790">
      <stop offset="0" stop-color="#FBA01C"/>
      <stop offset="1" stop-color="#2F6BF6"/>
    </linearGradient>
    <linearGradient id="qT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F1F4F8"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="230" fill="url(#qT)"/>
  <!-- Ring: centre (470,526), mid-radius 332, stroke 107 — 75% of the tile, left
       open across 88° so the rows sit clear of both caps. Coordinates are already
       tile-relative, so this variant needs no transform. -->
  <path d="M226.4 300.4A332 332 0 1 1 693.1 771.9" fill="none" stroke="url(#qA)" stroke-width="107" stroke-linecap="round"/>
  <path d="M713.6 751.6A332 332 0 0 1 235.5 761.2" fill="none" stroke="url(#qB)" stroke-width="107" stroke-linecap="round"/>
  <!-- three list rows, breaking out through the opening -->
  <circle cx="191" cy="408.5" r="34" fill="#F4515E"/>
  <rect x="270" y="381.5" width="276" height="54" rx="27" fill="#F4515E"/>
  <circle cx="191" cy="515.4" r="34" fill="#FBA01C"/>
  <rect x="270" y="488.4" width="276" height="54" rx="27" fill="#FBA01C"/>
  <circle cx="191" cy="624.6" r="34" fill="#2F6BF6"/>
  <rect x="270" y="597.6" width="276" height="54" rx="27" fill="#2F6BF6"/>
  <!-- the Q's tail, crossing the ring -->
  <path d="M585.2 703.5 776.5 894.8" fill="none" stroke="#7A4CF0" stroke-width="118" stroke-linecap="round"/>
</svg>
