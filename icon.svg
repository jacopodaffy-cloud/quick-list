<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="QuickList">
  <!-- Squircle background (transparent outside → crisp "any" app icon) -->
  <rect width="1024" height="1024" rx="232" fill="#2F6BF6"/>
  <!-- White note: a rounded card with three list-tabs stepping off its left edge -->
  <g fill="#fff">
    <rect x="252" y="340" width="220" height="96" rx="48"/>
    <rect x="268" y="464" width="204" height="96" rx="48"/>
    <rect x="288" y="588" width="184" height="96" rx="48"/>
    <rect x="410" y="268" width="390" height="520" rx="74"/>
  </g>
  <!-- Three rows: a coloured bullet + a matching line -->
  <circle cx="498" cy="388" r="30" fill="#2F6BF6"/>
  <circle cx="498" cy="512" r="30" fill="#17B981"/>
  <circle cx="498" cy="636" r="30" fill="#F8A81B"/>
  <rect x="560" y="371" width="160" height="34" rx="17" fill="#2F6BF6"/>
  <rect x="560" y="495" width="188" height="34" rx="17" fill="#17B981"/>
  <rect x="560" y="619" width="152" height="34" rx="17" fill="#F8A81B"/>
</svg>
