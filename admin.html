<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickList Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; }
    .header { background: #1a1a2e; padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #2a2a4a; }
    .header h1 { font-size: 1.4rem; font-weight: 700; color: #7c83ff; }
    .header span { font-size: 0.85rem; color: #888; }
    .container { max-width: 1100px; margin: 32px auto; padding: 0 24px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px; padding: 20px; }
    .stat-value { font-size: 2rem; font-weight: 700; color: #7c83ff; }
    .stat-label { font-size: 0.8rem; color: #888; margin-top: 4px; }
    .section-title { font-size: 1rem; font-weight: 600; color: #ccc; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; background: #1a1a2e; border-radius: 12px; overflow: hidden; }
    th { background: #16213e; padding: 12px 16px; text-align: left; font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
    td { padding: 12px 16px; border-top: 1px solid #2a2a4a; font-size: 0.9rem; }
    tr:hover td { background: #16213e; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.75rem; background: #7c83ff22; color: #7c83ff; }
    .loading { text-align: center; padding: 60px; color: #888; }
    .login-wall { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 16px; }
    .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.95rem; font-weight: 600; background: #7c83ff; color: white; }
    .btn:hover { background: #6970e8; }
    .error { color: #ff6b6b; font-size: 0.9rem; }
    .refresh { background: none; border: 1px solid #2a2a4a; color: #888; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
    .refresh:hover { border-color: #7c83ff; color: #7c83ff; }
    /* expandable "all lists" browser */
    tr.user-row { cursor: pointer; }
    tr.user-row td:first-child::before { content: '▸'; color: #7c83ff; display: inline-block; width: 14px; transition: transform .15s; }
    tr.user-row.open td:first-child::before { transform: rotate(90deg); }
    tr.lists-row > td { background: #12182b; padding: 0; }
    tr.lists-row .lists-wrap { padding: 14px 18px 18px 46px; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .list-block { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 10px; padding: 12px; }
    .lb-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .lb-dot { width: 12px; height: 12px; border-radius: 50%; flex: 0 0 auto; box-shadow: 0 0 0 2px #00000040 inset; }
    .lb-title { font-weight: 600; color: #e8e8e8; font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lb-count { margin-left: auto; font-size: 0.72rem; color: #888; background: #7c83ff18; padding: 2px 7px; border-radius: 20px; flex: 0 0 auto; }
    .items { display: flex; flex-direction: column; gap: 3px; }
    .il { font-size: 0.82rem; color: #b8b8c8; padding-left: 14px; position: relative; }
    .il::before { content: '○'; position: absolute; left: 0; color: #555; font-size: 0.7rem; }
    .il.done { color: #6a6a78; text-decoration: line-through; }
    .il.done::before { content: '●'; color: #7c83ff; }
    .items.empty, .lists-none { color: #666; font-size: 0.82rem; padding: 4px 0; }
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab { padding: 8px 16px; border-radius: 8px; border: 1px solid #2a2a4a; background: none; color: #888; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
    .tab.on { background: #7c83ff; color: #fff; border-color: #7c83ff; }
  </style>
</head>
<body>

<div id="login-wall" class="login-wall" style="display:none">
  <div style="font-size:2rem">🔐</div>
  <h2 style="color:#7c83ff">Admin Panel</h2>
  <p style="color:#888">Accedi con l'account admin</p>
  <button class="btn" id="login-btn">Accedi con Google</button>
  <p class="error" id="login-error"></p>
</div>

<div id="app" style="display:none">
  <div class="header">
    <h1>⚡ QuickList Admin</h1>
    <div style="display:flex;align-items:center;gap:12px">
      <button class="refresh" id="refresh-btn">↻ Aggiorna</button>
      <span id="admin-email"></span>
    </div>
  </div>
  <div class="container">
    <div class="stats" id="stats">
      <div class="stat"><div class="stat-value" id="stat-users">—</div><div class="stat-label">Utenti totali</div></div>
      <div class="stat"><div class="stat-value" id="stat-lists">—</div><div class="stat-label">Liste create</div></div>
      <div class="stat"><div class="stat-value" id="stat-items">—</div><div class="stat-label">Elementi totali</div></div>
    </div>
    <div class="section-title">Utenti registrati <span style="font-weight:400;color:#666;font-size:0.8rem">· clicca una riga per vedere tutte le sue liste</span></div>
    <div id="loading" class="loading">Caricamento...</div>
    <table id="user-table" style="display:none">
      <thead>
        <tr>
          <th>Nome / Email</th>
          <th>UID</th>
          <th>Accesso</th>
          <th>Liste</th>
          <th>Elementi</th>
          <th>Registrato</th>
          <th>Ultimo accesso</th>
        </tr>
      </thead>
      <tbody id="user-tbody"></tbody>
    </table>
  </div>
</div>

<script type="module">
  const ADMIN_EMAIL = 'jacopodaffy@gmail.com';
  const FB = 'https://www.gstatic.com/firebasejs/10.12.5/';
  // escape untrusted user data before putting it in the DOM (prevents stored XSS
  // via a malicious displayName/email aimed at the admin's browser)
  const esc = s => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

  const cfg = {
    apiKey: "AIzaSyCqpquRDztkMRJ3HHU-Uuxuh9-xU48pUmw",
    authDomain: "qwicklist-d8ee6.firebaseapp.com",
    projectId: "qwicklist-d8ee6",
    storageBucket: "qwicklist-d8ee6.firebasestorage.app",
    messagingSenderId: "491197590751",
    appId: "1:491197590751:web:25352a36ab480b3d104d6a"
  };

  const [appMod, authMod, fsMod] = await Promise.all([
    import(FB + 'firebase-app.js'),
    import(FB + 'firebase-auth.js'),
    import(FB + 'firebase-firestore.js')
  ]);

  const fbApp = appMod.initializeApp(cfg);
  const auth = authMod.getAuth(fbApp);
  const db = fsMod.getFirestore(fbApp);

  authMod.onAuthStateChanged(auth, async user => {
    if (!user) {
      document.getElementById('login-wall').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
      return;
    }
    if (user.email !== ADMIN_EMAIL) {
      document.getElementById('login-wall').style.display = 'flex';
      document.getElementById('login-error').textContent = '⛔ Accesso negato: non sei l\'admin.';
      document.getElementById('login-btn').style.display = 'none';
      await authMod.signOut(auth);
      return;
    }
    document.getElementById('login-wall').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('admin-email').textContent = user.email;
    loadUsers();
  });

  document.getElementById('login-btn').addEventListener('click', async () => {
    try {
      await authMod.signInWithPopup(auth, new authMod.GoogleAuthProvider());
    } catch(e) {
      document.getElementById('login-error').textContent = e.message;
    }
  });

  document.getElementById('refresh-btn').addEventListener('click', loadUsers);

  const fmt = ms => Number.isFinite(ms) ? new Date(ms).toLocaleString('it-IT') : '—';

  // Strip the app's lightweight inline formatting markers for clean display.
  const stripMarks = s => String(s == null ? '' : s).replace(/\*\*(.+?)\*\*/g, '$1').replace(/__(.+?)__/g, '$1');
  const safeColor = c => /^#[0-9a-fA-F]{3,8}$/.test(c || '') ? c : '#7c83ff';

  // Render one user's full set of lists (title, colour, items, progress).
  function listsBlockHTML(lists) {
    if (!lists || !lists.length) return '<div class="lists-none">No lists.</div>';
    return lists.map(l => {
      const items = Array.isArray(l.items) ? l.items : [];
      const done = items.filter(i => i && i.done).length;
      const title = (l.title && String(l.title).trim()) ? stripMarks(l.title) : 'Untitled';
      const itemsHtml = items.length
        ? `<div class="items">${items.map(i => `<span class="il ${i && i.done ? 'done' : ''}">${esc(stripMarks(i && i.text))}</span>`).join('')}</div>`
        : '<div class="items empty">empty</div>';
      return `<div class="list-block">
        <div class="lb-head"><span class="lb-dot" style="background:${esc(safeColor(l.color))}"></span><span class="lb-title">${esc(title)}</span><span class="lb-count">${done}/${items.length}</span></div>
        ${itemsHtml}
      </div>`;
    }).join('');
  }

  // Expand / collapse a user's lists (one delegated listener; tbody is stable).
  document.getElementById('user-tbody').addEventListener('click', e => {
    const row = e.target.closest('tr.user-row');
    if (!row) return;
    const det = document.getElementById('lists-' + row.dataset.uid);
    if (!det) return;
    const open = det.hidden;
    det.hidden = !open;
    row.classList.toggle('open', open);
  });

  async function loadUsers() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('user-table').style.display = 'none';
    try {
      // profiles = registration database (identity), users = list data. Merge by uid.
      const [profSnap, userSnap] = await Promise.all([
        fsMod.getDocs(fsMod.collection(db, 'profiles')),
        fsMod.getDocs(fsMod.collection(db, 'users')),
      ]);

      const byUid = {};
      profSnap.forEach(d => { byUid[d.id] = { uid: d.id, ...d.data() }; });
      userSnap.forEach(d => { byUid[d.id] = Object.assign({ uid: d.id }, byUid[d.id], { _data: d.data() }); });

      const rows = Object.values(byUid).sort((a, b) =>
        (b.lastLoginAt || (b._data && b._data.updatedAt) || 0) - (a.lastLoginAt || (a._data && a._data.updatedAt) || 0));

      let totalLists = 0, totalItems = 0;
      const tbody = document.getElementById('user-tbody');
      tbody.innerHTML = '';

      let html = '';
      rows.forEach(u => {
        const data = u._data || {};
        const lists = data.lists || [];
        const items = lists.reduce((acc, l) => acc + (l.items ? l.items.length : 0), 0);
        totalLists += lists.length;
        totalItems += items;

        const name = u.displayName || u.email || u.uid;
        const last = u.lastLoginAt || data.updatedAt;

        html += `<tr class="user-row" data-uid="${esc(u.uid)}">
          <td>${esc(name)}<div style="font-size:0.72rem;color:#888">${esc(u.email || '')}</div></td>
          <td style="font-family:monospace;font-size:0.72rem;color:#888">${esc(u.uid)}</td>
          <td><span class="badge">${esc(u.provider || '—')}</span></td>
          <td><span class="badge">${lists.length | 0}</span></td>
          <td><span class="badge">${items | 0}</span></td>
          <td style="color:#888">${esc(fmt(u.createdAt))}</td>
          <td style="color:#888">${esc(fmt(last))}</td>
        </tr>
        <tr class="lists-row" id="lists-${esc(u.uid)}" hidden><td colspan="7"><div class="lists-wrap">${listsBlockHTML(lists)}</div></td></tr>`;
      });
      tbody.innerHTML = html;

      document.getElementById('stat-users').textContent = rows.length;
      document.getElementById('stat-lists').textContent = totalLists;
      document.getElementById('stat-items').textContent = totalItems;
      document.getElementById('loading').style.display = 'none';
      document.getElementById('user-table').style.display = 'table';
    } catch(e) {
      document.getElementById('loading').textContent = '❌ Errore: ' + e.message;
    }
  }
</script>
</body>
</html>
