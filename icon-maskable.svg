<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="QuickList">
  <defs>
    <!-- A conic sweep is not available in SVG, so the Q is two arc segments:
         red→orange over the top and right, then orange→blue down to the tail.
         They overlap by 5° so the join is seamless. -->
    <linearGradient id="qlRingMA" gradientUnits="userSpaceOnUse" x1="328.5" y1="381.7" x2="733.7" y2="721.7">
      <stop offset="0" stop-color="#F4515E"/><stop offset="1" stop-color="#FCA019"/>
    </linearGradient>
    <linearGradient id="qlRingMB" gradientUnits="userSpaceOnUse" x1="749.4" y1="704.7" x2="480" y2="790">
      <stop offset="0" stop-color="#FCA019"/><stop offset="1" stop-color="#1E6FF5"/>
    </linearGradient>
    <linearGradient id="qlTileM" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F1F4F8"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed: the OS applies its own mask, so the tile must reach every edge. -->
  <rect width="1024" height="1024" fill="url(#qlTileM)"/>
  <!-- Same artwork as icon.svg, scaled to 0.80 so every part — including the
       tail's round cap — stays inside the maskable safe zone (centre 80%). -->
  <g transform="translate(512 512) scale(.8) translate(-514.5 -589.75)">
    <path d="M328.5 381.7A265.5 265.5 0 1 1 733.7 721.7" fill="none"
          stroke="url(#qlRingMA)" stroke-width="107" stroke-linecap="round"/>
    <path d="M749.4 704.7A265.5 265.5 0 0 1 323.3 678.6" fill="none"
          stroke="url(#qlRingMB)" stroke-width="107" stroke-linecap="round"/>
    <circle cx="198" cy="416" r="34" fill="#F4515E"/>
    <rect x="277" y="389" width="277" height="54" rx="27" fill="#F4515E"/>
    <circle cx="198" cy="524" r="34" fill="#FCA019"/>
    <rect x="277" y="497" width="277" height="54" rx="27" fill="#FCA019"/>
    <circle cx="198" cy="634" r="34" fill="#1E6FF5"/>
    <rect x="277" y="607" width="277" height="54" rx="27" fill="#1E6FF5"/>
    <path d="M594 713 786 905" fill="none" stroke="#7A4CF0" stroke-width="119" stroke-linecap="round"/>
  </g>
</svg>
