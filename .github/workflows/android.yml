name: Build Android

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK (use the runner's preinstalled SDK)
        run: |
          # The android-actions/setup-android action started failing on the current
          # runner image (interactive license prompt). The ubuntu runner already
          # ships an Android SDK, so use it directly and accept licenses ourselves.
          export ANDROID_HOME="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          echo "Using ANDROID_HOME=$ANDROID_HOME"
          SDKMGR="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMGR" --licenses >/dev/null 2>&1 || true
          "$SDKMGR" "platform-tools" "platforms;android-35" "build-tools;35.0.0"
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> "$GITHUB_ENV"

      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html app.css app.js theme.js manifest.webmanifest sw.js icon.svg icon-maskable.svg icon-192.png icon-512.png config.js www/

      - name: Add Android platform (Capacitor)
        run: npx cap add android

      - name: Sync web assets into the Android project
        run: npx cap sync android

      - name: Configure native Google Sign-In (web client id)
        run: |
          # The lightweight @codetrix-studio/capacitor-google-auth plugin reads the
          # OAuth web client id from this string resource on Android.
          STR=android/app/src/main/res/values/strings.xml
          sed -i 's#</resources>#    <string name="server_client_id">491197590751-13eaa8v0e0478r59476r25kjj6ahm9vl.apps.googleusercontent.com</string>\n</resources>#' "$STR"
          echo "=== strings.xml ===" ; cat "$STR"

      - name: Set custom app icon
        run: |
          pip install Pillow --break-system-packages -q
          python3 tools/gen_icons.py

      - name: Override variables.gradle and version code
        run: |
          cp variables.gradle android/variables.gradle
          sed -i 's/versionCode 1/versionCode 39/g' android/app/build.gradle
          echo "=== variables.gradle ==="
          cat android/variables.gradle
          echo "=== versionCode ==="
          grep versionCode android/app/build.gradle

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | python3 -c "import sys,base64; open('android/app/quicklist-release.keystore','wb').write(base64.b64decode(sys.stdin.read().strip()))"

      - name: Build release AAB (Play Store)
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/quicklist-release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Build release APK (sideload)
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/quicklist-release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Smoke test — boot an emulator and verify the app actually opens
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: false
          script: |
            set +e
            APK=android/app/build/outputs/apk/release/app-release.apk
            echo "===== WAIT FOR FULL BOOT ====="
            adb wait-for-device
            for i in $(seq 1 90); do
              [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" = "1" ] && { echo "boot_completed after ${i}x2s"; break; }
              sleep 2
            done
            adb shell settings put global package_verifier_enable 0 >/dev/null 2>&1
            sleep 5
            echo "===== INSTALL (with retries) ====="
            for i in 1 2 3 4 5 6; do
              echo "-- install attempt $i --"
              adb install -r -d "$APK" && { echo "INSTALL OK"; break; }
              adb kill-server >/dev/null 2>&1; adb start-server >/dev/null 2>&1; adb wait-for-device
              sleep 10
            done
            adb logcat -c
            echo "===== LAUNCH ====="
            adb shell monkey -p app.quicklist.twa -c android.intent.category.LAUNCHER 1
            sleep 14
            echo "===== PROCESS CHECK ====="
            (adb shell pidof app.quicklist.twa && echo "RESULT: PROCESS ALIVE (app stayed open)") || echo "RESULT: NOT RUNNING (likely crashed on launch)"
            echo "===== CRASH SCAN ====="
            adb logcat -d > lc.txt
            if grep -q "FATAL EXCEPTION" lc.txt; then
              echo "RESULT: FATAL EXCEPTION FOUND — stack trace below"
              grep -B3 -A50 "FATAL EXCEPTION" lc.txt
            else
              echo "RESULT: no FATAL EXCEPTION (good)"
            fi
            echo "===== RELEVANT LOGS ====="
            grep -iE "quicklist|firebaseauth|firebase|google|AndroidRuntime|Capacitor|chromium" lc.txt | tail -80
            exit 0

      - name: Upload AAB (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: QuickList-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Upload APK (sideload)
        uses: actions/upload-artifact@v4
        with:
          name: QuickList-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
