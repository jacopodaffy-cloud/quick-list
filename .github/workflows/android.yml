name: Build Android

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK (use the runner's preinstalled SDK)
        run: |
          # The android-actions/setup-android action started failing on the current
          # runner image (interactive license prompt). The ubuntu runner already
          # ships an Android SDK, so use it directly and accept licenses ourselves.
          export ANDROID_HOME="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          echo "Using ANDROID_HOME=$ANDROID_HOME"
          SDKMGR="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMGR" --licenses >/dev/null 2>&1 || true
          "$SDKMGR" "platform-tools" "platforms;android-35" "build-tools;35.0.0"
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> "$GITHUB_ENV"

      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html app.css app.js theme.js manifest.webmanifest sw.js icon.svg icon-maskable.svg icon-192.png icon-512.png config.js www/

      - name: Add Android platform (Capacitor)
        run: npx cap add android

      - name: Sync web assets into the Android project
        run: npx cap sync android

      - name: Patch MainActivity for native Google sign-in (SocialLogin callback)
        run: |
          # @capgo/capacitor-social-login needs the main activity to route Google's
          # authorization result back to the plugin (its documented setup). Without
          # this, the access-token consent flow could leave the login hanging.
          MA=android/app/src/main/java/app/quicklist/twa/MainActivity.java
          cat > "$MA" <<'EOF'
          package app.quicklist.twa;

          import android.content.Intent;
          import com.getcapacitor.BridgeActivity;
          import com.getcapacitor.Plugin;
          import com.getcapacitor.PluginHandle;
          import ee.forgr.capacitor.social.login.GoogleProvider;
          import ee.forgr.capacitor.social.login.ModifiedMainActivityForSocialLoginPlugin;
          import ee.forgr.capacitor.social.login.SocialLoginPlugin;

          public class MainActivity extends BridgeActivity implements ModifiedMainActivityForSocialLoginPlugin {

            @Override
            public void onActivityResult(int requestCode, int resultCode, Intent data) {
              super.onActivityResult(requestCode, resultCode, data);
              if (requestCode >= GoogleProvider.REQUEST_AUTHORIZE_GOOGLE_MIN && requestCode < GoogleProvider.REQUEST_AUTHORIZE_GOOGLE_MAX) {
                PluginHandle pluginHandle = getBridge().getPlugin("SocialLogin");
                if (pluginHandle == null) return;
                Plugin plugin = pluginHandle.getInstance();
                if (!(plugin instanceof SocialLoginPlugin)) return;
                ((SocialLoginPlugin) plugin).handleGoogleLoginIntent(requestCode, data);
              }
            }

            @Override
            public void IHaveModifiedTheMainActivityForTheUseWithSocialLoginPlugin() {}
          }
          EOF
          echo "=== MainActivity.java ===" ; cat "$MA"

      - name: Add the QuickList home-screen widget (native)
        run: |
          # A real Android AppWidget: tap anywhere → open QuickList; tap the "+"
          # → cold/warm-start straight into a new list (quicklist://new is handled
          # by the @capacitor/app appUrlOpen/getLaunchUrl listeners in app.js).
          # Injected here because the android/ project is regenerated every build.
          PKG=android/app/src/main/java/app/quicklist/twa
          RES=android/app/src/main/res
          mkdir -p "$PKG" "$RES/layout" "$RES/xml" "$RES/drawable" "$RES/values" "$RES/values-night"

          # NOTE: the widget receiver must be android:exported="true" — the system
          # launcher (a different process) sends APPWIDGET_UPDATE and reads the
          # provider to show it in the widget picker. exported="false" hides it.
          cat > "$PKG/QuickListWidget.java" <<'EOF'
          package app.quicklist.twa;

          import android.app.PendingIntent;
          import android.appwidget.AppWidgetManager;
          import android.appwidget.AppWidgetProvider;
          import android.content.Context;
          import android.content.Intent;
          import android.net.Uri;
          import android.widget.RemoteViews;

          public class QuickListWidget extends AppWidgetProvider {
            @Override
            public void onUpdate(Context context, AppWidgetManager manager, int[] ids) {
              for (int id : ids) {
                RemoteViews views = new RemoteViews(context.getPackageName(), R.layout.widget_quicklist);

                Intent open = new Intent(context, MainActivity.class);
                open.setFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                views.setOnClickPendingIntent(R.id.widget_root,
                  PendingIntent.getActivity(context, 0, open,
                    PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE));

                Intent add = new Intent(context, MainActivity.class);
                add.setAction(Intent.ACTION_VIEW);
                add.setData(Uri.parse("quicklist://new"));
                add.setFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                views.setOnClickPendingIntent(R.id.widget_add,
                  PendingIntent.getActivity(context, 1, add,
                    PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE));

                manager.updateAppWidget(id, views);
              }
            }
          }
          EOF

          cat > "$RES/layout/widget_quicklist.xml" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:id="@+id/widget_root"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="horizontal"
              android:gravity="center_vertical"
              android:background="@drawable/ql_widget_bg"
              android:padding="14dp">
              <ImageView
                  android:layout_width="42dp"
                  android:layout_height="42dp"
                  android:src="@mipmap/ic_launcher"
                  android:contentDescription="QuickList" />
              <LinearLayout
                  android:layout_width="0dp"
                  android:layout_height="wrap_content"
                  android:layout_weight="1"
                  android:layout_marginStart="12dp"
                  android:orientation="vertical">
                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="QuickList"
                      android:textStyle="bold"
                      android:textSize="16sp"
                      android:textColor="@color/ql_widget_ink" />
                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="Open your lists"
                      android:textSize="12sp"
                      android:textColor="@color/ql_widget_ink2" />
              </LinearLayout>
              <TextView
                  android:id="@+id/widget_add"
                  android:layout_width="42dp"
                  android:layout_height="42dp"
                  android:gravity="center"
                  android:text="+"
                  android:textSize="24sp"
                  android:textStyle="bold"
                  android:textColor="#FFFFFF"
                  android:background="@drawable/ql_widget_plus"
                  android:contentDescription="New list" />
          </LinearLayout>
          EOF

          cat > "$RES/xml/widget_quicklist_info.xml" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <appwidget-provider xmlns:android="http://schemas.android.com/apk/res/android"
              android:minWidth="250dp"
              android:minHeight="48dp"
              android:minResizeWidth="180dp"
              android:minResizeHeight="48dp"
              android:targetCellWidth="4"
              android:targetCellHeight="1"
              android:updatePeriodMillis="0"
              android:initialLayout="@layout/widget_quicklist"
              android:resizeMode="horizontal"
              android:widgetCategory="home_screen" />
          EOF

          cat > "$RES/drawable/ql_widget_bg.xml" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <solid android:color="@color/ql_widget_bg" />
              <corners android:radius="24dp" />
          </shape>
          EOF

          cat > "$RES/drawable/ql_widget_plus.xml" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#5A63E0" />
          </shape>
          EOF

          cat > "$RES/values/ql_widget.xml" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ql_widget_bg">#FFFFFF</color>
              <color name="ql_widget_ink">#14161B</color>
              <color name="ql_widget_ink2">#5A6072</color>
          </resources>
          EOF

          cat > "$RES/values-night/ql_widget.xml" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ql_widget_bg">#17191F</color>
              <color name="ql_widget_ink">#EDEFF4</color>
              <color name="ql_widget_ink2">#A2A9BA</color>
          </resources>
          EOF

          # Register the widget receiver in the manifest
          M=android/app/src/main/AndroidManifest.xml
          python3 - <<'PY'
          p = 'android/app/src/main/AndroidManifest.xml'
          s = open(p).read()
          rec = '''        <receiver android:name=".QuickListWidget" android:exported="true" android:label="QuickList">
                  <intent-filter>
                      <action android:name="android.appwidget.action.APPWIDGET_UPDATE" />
                  </intent-filter>
                  <meta-data android:name="android.appwidget.provider" android:resource="@xml/widget_quicklist_info" />
              </receiver>
          '''
          s = s.replace('</application>', rec + '    </application>')
          open(p, 'w').write(s)
          PY
          echo "=== widget receiver ===" ; grep -B1 -A5 QuickListWidget "$M"

      - name: Strip ad/legacy permissions from the merged manifest
        run: |
          # Google Play libraries pull in permissions QuickList never uses:
          # AD_ID + ACCESS_ADSERVICES_* trip the Play Console "Advertising ID"
          # declaration (the app has no ads), USE_CREDENTIALS triggers an
          # upgrade warning for users on old versions, and DUMP is debug-only.
          # tools:node="remove" makes the manifest merger drop them from the
          # final AAB/APK no matter which library declares them.
          M=android/app/src/main/AndroidManifest.xml
          grep -q 'xmlns:tools' "$M" || sed -i 's#<manifest #<manifest xmlns:tools="http://schemas.android.com/tools" #' "$M"
          # POST_NOTIFICATIONS: required on Android 13+ for due-date reminders
          # (@capacitor/local-notifications asks the user at runtime; this only
          # declares the capability — the merger dedupes if the plugin adds it too).
          # RECORD_AUDIO is deliberately NOT declared. Declaring it would buy
          # nothing today — Android's WebView ships no speech-recognition
          # service, so the Web Speech API cannot work inside the APK even with
          # the permission granted — while costing real harm: minSdk is 22, and
          # below API 23 permissions are granted at INSTALL time, so adding a
          # dangerous permission makes Play warn that existing users "may be
          # unable to upgrade" (auto-update stops until they accept by hand).
          # Voice stays a web/PWA feature and app.js hides the mic button in the
          # native shell. Add this back only together with a real native plugin
          # (@capacitor-community/speech-recognition), never on its own.
          sed -i 's#</manifest>#    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>\n    <uses-permission android:name="com.google.android.gms.permission.AD_ID" tools:node="remove"/>\n    <uses-permission android:name="android.permission.ACCESS_ADSERVICES_AD_ID" tools:node="remove"/>\n    <uses-permission android:name="android.permission.ACCESS_ADSERVICES_ATTRIBUTION" tools:node="remove"/>\n    <uses-permission android:name="android.permission.ACCESS_ADSERVICES_CUSTOM_AUDIENCE" tools:node="remove"/>\n    <uses-permission android:name="android.permission.USE_CREDENTIALS" tools:node="remove"/>\n    <uses-permission android:name="android.permission.DUMP" tools:node="remove"/>\n</manifest>#' "$M"
          echo "=== AndroidManifest.xml ===" ; cat "$M"

      - name: Set custom app icon
        run: |
          pip install Pillow --break-system-packages -q
          python3 tools/gen_icons.py

      - name: Override variables.gradle and version code
        run: |
          cp variables.gradle android/variables.gradle
          sed -i 's/versionCode 1/versionCode 58/g' android/app/build.gradle
          echo "=== variables.gradle ==="
          cat android/variables.gradle
          echo "=== versionCode ==="
          grep versionCode android/app/build.gradle
          # Harden the Gradle wrapper download. The default -all distribution is
          # ~200MB and the wrapper's network timeout is only 10s, so on a slow
          # runner the "Downloading gradle-8.x-all.zip" step times out and the
          # whole build fails before it compiles anything (a transient CI flake,
          # not an app problem). Use the smaller -bin distribution and a 120s
          # timeout so a slow download retries/waits instead of aborting.
          WP=android/gradle/wrapper/gradle-wrapper.properties
          sed -i 's#-all\.zip#-bin.zip#' "$WP"
          if grep -q '^networkTimeout' "$WP"; then
            sed -i 's/^networkTimeout=.*/networkTimeout=120000/' "$WP"
          else
            echo 'networkTimeout=120000' >> "$WP"
          fi
          echo "=== gradle-wrapper.properties ===" ; cat "$WP"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | python3 -c "import sys,base64; open('android/app/quicklist-release.keystore','wb').write(base64.b64decode(sys.stdin.read().strip()))"

      - name: Build release AAB (Play Store)
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/quicklist-release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Build release APK (sideload)
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/quicklist-release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Build debug APK (for the emulator login-tap test)
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      # Without KVM the emulator boots in slow software mode and often times out.
      - name: Enable KVM (hardware acceleration for the emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Smoke test — launch check + drive the Google login tap on an emulator
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          # google_apis image: has Play services, so the Credential Manager code
          # path used by native Google sign-in actually executes.
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: false
          emulator-boot-timeout: 900
          # Single command — the action runs each script line separately, so multi-line
          # shell (for/if) must live in a file that bash runs as one unit.
          script: bash tools/smoke.sh

      - name: Upload AAB (Play Store)
        uses: actions/upload-artifact@v5
        with:
          name: QuickList-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Upload APK (sideload)
        uses: actions/upload-artifact@v5
        with:
          name: QuickList-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
