name: Build Android

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: yes | sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html app.css app.js manifest.webmanifest sw.js icon.svg icon-maskable.svg icon-192.png icon-512.png config.js www/

      - name: Add Android platform (Capacitor)
        run: npx cap add android

      - name: Sync web assets into the Android project
        run: npx cap sync android

      - name: Set targetSdk to 35
        run: |
          sed -i 's/targetSdkVersion 34/targetSdkVersion 35/g' android/app/build.gradle
          sed -i 's/targetSdk = 34/targetSdk = 35/g' android/app/build.gradle
          sed -i 's/compileSdkVersion 34/compileSdkVersion 35/g' android/app/build.gradle
          sed -i 's/compileSdk = 34/compileSdk = 35/g' android/app/build.gradle

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | python3 -c "import sys,base64; open('android/app/quicklist-release.keystore','wb').write(base64.b64decode(sys.stdin.read().strip()))"

      - name: Build release AAB (Play Store)
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/quicklist-release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Build release APK (sideload)
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/quicklist-release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: QuickList-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Upload APK (sideload)
        uses: actions/upload-artifact@v4
        with:
          name: QuickList-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
